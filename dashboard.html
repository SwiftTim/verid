<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deriv Predictor Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            height: 100vh;
            box-sizing: border-box;
        }

        .sidebar {
            background-color: #1e293b;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background-color: #1e293b;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1,
        h2,
        h3 {
            margin: 0;
        }

        h1 {
            font-size: 1.5rem;
            color: #38bdf8;
        }

        h2 {
            font-size: 1rem;
            color: #94a3b8;
            font-weight: normal;
        }

        .signal-box {
            background-color: #334155;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .signal-box.UP {
            background-color: #059669;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.3);
        }

        .signal-box.DOWN {
            background-color: #dc2626;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.3);
        }

        .signal-box.SKIP {
            background-color: #475569;
        }

        .signal-text {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .confidence {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-item {
            background-color: #334155;
            padding: 10px;
            border-radius: 8px;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
        }

        #price-chart {
            width: 100%;
            height: 100%;
        }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #ef4444;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        .status-dot.connected {
            background-color: #22c55e;
        }
    </style>
</head>

<body>

    <!-- Sidebar: Stats & Info -->
    <div class="sidebar">
        <div>
            <h1>Deriv Predictor</h1>
            <h2><span id="connection-status" class="status-dot"></span><span id="status-text">Disconnected</span></h2>
        </div>

        <div class="stat-grid">
            <div class="stat-item">
                <div class="stat-label">Symbol</div>
                <div class="stat-value">R_100</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Current Price</div>
                <div class="stat-value" id="current-price">--</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Ticks Seen</div>
                <div class="stat-value" id="tick-count">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Predictions</div>
                <div class="stat-value" id="pred-count">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Kelly Bet Size</div>
                <div class="stat-value" id="kelly-size">--%</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Regime</div>
                <div class="stat-value" id="regime-status">--</div>
            </div>
        </div>

        <div class="card">
            <h3>Engine Status</h3>
            <p style="font-size: 0.9rem; color: #cbd5e1; margin-top: 10px;" id="engine-message">
                Waiting for data...
            </p>
        </div>
    </div>

    <!-- Main Content: Signal & Chart -->
    <div class="main-content">
        <!-- Big Signal Box -->
        <div id="signal-box" class="signal-box SKIP">
            <div class="signal-text" id="signal-text">WAIT</div>
            <div class="confidence" id="confidence-text">Buffering data...</div>
        </div>

        <!-- Chart -->
        <div class="card" style="flex-grow: 1; position: relative;">
            <canvas id="priceChart"></canvas>
        </div>
    </div>

    <script>
        // Connect to WebSocket
        const socket = new WebSocket('ws://localhost:8000/ws');

        // Chart Setup
        const ctx = document.getElementById('priceChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Price (R_100)',
                    data: [],
                    borderColor: '#38bdf8',
                    backgroundColor: 'rgba(56, 189, 248, 0.1)',
                    borderWidth: 2,
                    pointRadius: 0,
                    tension: 0.1,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { display: false },
                    y: {
                        position: 'right',
                        grid: { color: '#334155' },
                        ticks: { color: '#94a3b8' }
                    }
                }
            }
        });

        // State
        let ticksArray = [];
        const MAX_POINTS = 100;

        // WebSocket Handlers
        socket.onopen = () => {
            document.getElementById('connection-status').classList.add('connected');
            document.getElementById('status-text').innerText = 'Online';
        };

        socket.onclose = () => {
            document.getElementById('connection-status').classList.remove('connected');
            document.getElementById('status-text').innerText = 'Disconnected';
        };

        socket.onmessage = (event) => {
            const msg = JSON.parse(event.data);

            if (msg.type === 'tick') {
                updateChart(msg.data);
                document.getElementById('current-price').innerText = msg.data.quote.toFixed(2);
                document.getElementById('tick-count').innerText = ticksArray.length; // Approximate
            }
            else if (msg.type === 'prediction') {
                updateSignal(msg.data);
            }
        };

        function updateChart(tick) {
            ticksArray.push(tick);
            if (ticksArray.length > MAX_POINTS) ticksArray.shift();

            chart.data.labels = ticksArray.map(t => new Date(t.timestamp * 1000).toLocaleTimeString());
            chart.data.datasets[0].data = ticksArray.map(t => t.quote);
            chart.update();
        }

        function updateSignal(pred) {
            const box = document.getElementById('signal-box');
            const text = document.getElementById('signal-text');
            const conf = document.getElementById('confidence-text');
            const engineMsg = document.getElementById('engine-message');

            const decision = pred.final_decision || 'SKIP';
            const confidence = (pred.confidence * 100).toFixed(1);

            // Update Class
            box.className = 'signal-box';
            if (decision === 'UP' || decision === 'BUY') box.classList.add('UP');
            else if (decision === 'DOWN' || decision === 'SELL') box.classList.add('DOWN');
            else box.classList.add('SKIP');

            // Update Text
            if (decision === 'UP' || decision === 'BUY') text.innerText = 'BUY ▲';
            else if (decision === 'DOWN' || decision === 'SELL') text.innerText = 'SELL ▼';
            else text.innerText = 'WAIT';

            conf.innerText = `Confidence: ${confidence}%`;

            // Update Kelly & Regime
            document.getElementById('kelly-size').innerText =
                pred.kelly_pct ? (pred.kelly_pct * 100).toFixed(2) + '%' : '--';
            document.getElementById('regime-status').innerText =
                pred.regime_approved ? '✅ GO' : '⏸ WAIT';

            // Update Engine Status
            document.getElementById('pred-count').innerText = parseInt(document.getElementById('pred-count').innerText) + 1;

            const lstm = (pred.lstm_prob * 100).toFixed(0);
            const tree = (pred.tree_prob * 100).toFixed(0);

            engineMsg.innerHTML = `
                <strong>AI Analysis:</strong><br>
                LSTM Model: ${lstm}% Bullish<br>
                Tree Model: ${tree}% Bullish<br>
                Combined: ${(pred.combined_prob * 100).toFixed(1)}%
            `;
        }

        // Ping to keep alive
        setInterval(() => {
            if (socket.readyState === WebSocket.OPEN) socket.send('ping');
        }, 5000);

    </script>
</body>

</html>
